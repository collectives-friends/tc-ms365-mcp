name: ci
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
jobs:
  ci:
    uses: collectives-friends/.github/.github/workflows/node-ci.yml@main
    with:
      package-manager: "npm"
      node-version: "22"
      setup-cmd: "npm run generate"
      typecheck-cmd: "npm run build"
